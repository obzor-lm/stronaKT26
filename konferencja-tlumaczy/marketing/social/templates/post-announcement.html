<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1200, initial-scale=1">
  <!--
    SZABLON: Post ogłoszeniowy (Facebook / LinkedIn)
    Rozmiar: 1200 × 630 px
    Użycie: podmień zmienne, uruchom screenshot-social.sh
    
    ZMIENNE:
    - Edytuj tekst bezpośrednio w HTML poniżej
    - Tło: zamień URL w .poster na NanoBanana/Canva output
  -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    .poster {
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #0f2440 0%, #1a3a5c 50%, #2d5f8a 100%);
      /* Podmień na zdjęcie tła:
         background: linear-gradient(135deg, rgba(15,36,64,0.85), rgba(26,58,92,0.85)), url('output/hero-bg.jpg') center/cover;
      */
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px 80px;
      position: relative;
      overflow: hidden;
      font-family: 'DM Sans', sans-serif;
    }

    .poster::before {
      content: '';
      position: absolute;
      top: -100px;
      right: -100px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(212, 160, 60, 0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .badge {
      display: inline-block;
      background: #d4a03c;
      color: #0f2440;
      font-size: 16px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding: 8px 20px;
      border-radius: 6px;
      margin-bottom: 24px;
      width: fit-content;
    }

    .title {
      font-family: 'DM Serif Display', serif;
      font-size: 64px;
      line-height: 1.1;
      color: #ffffff;
      margin-bottom: 20px;
      max-width: 700px;
    }

    .subtitle {
      font-size: 24px;
      color: rgba(255, 255, 255, 0.75);
      max-width: 600px;
      line-height: 1.5;
    }

    .meta {
      position: absolute;
      bottom: 48px;
      left: 80px;
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .meta-item {
      font-size: 18px;
      font-weight: 700;
      color: #e8c06a;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .meta-dot {
      width: 6px;
      height: 6px;
      background: #e8c06a;
      border-radius: 50%;
    }

    .logo-area {
      position: absolute;
      bottom: 48px;
      right: 80px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 14px;
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="poster">
    <div class="badge">Save the date</div>
    <h1 class="title">Konferencja Tłumaczy 2026</h1>
    <p class="subtitle">Najważniejsze spotkanie branży tłumaczeniowej w Polsce. Dołącz do nas!</p>
    <div class="meta">
      <span class="meta-item">26 września 2026</span>
      <span class="meta-dot"></span>
      <span class="meta-item">Warszawa</span>
    </div>
    <div class="logo-area">
      konferencja-tlumaczy.pl
    </div>
  </div>
</body>
</html>
